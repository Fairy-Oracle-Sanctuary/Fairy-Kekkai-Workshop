name: Build CI
# 自动+手动双触发；产物仅作为 Artifact 上传
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Fairy-Kekkai-Workshop-Windows
            artifact_path: dist/Fairy-Kekkai-Workshop.dist/Fairy-Kekkai-Workshop.exe
            deploy_args: ""
          - os: macos-latest
            artifact_name: Fairy-Kekkai-Workshop-macOS
            artifact_path: dist/Fairy-Kekkai-Workshop.dmg
            deploy_args: ""
          - os: ubuntu-latest
            artifact_name: Fairy-Kekkai-Workshop-Linux
            artifact_path: dist/Fairy-Kekkai-Workshop/Fairy-Kekkai-Workshop
            deploy_args: ""

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装 PyInstaller（Linux 分支使用）
        run: pip install pyinstaller

      - name: 安装项目依赖
        run: pip install -r requirements.txt

      - name: 安装 Nuitka（Windows / macOS）
        if: matrix.os != 'ubuntu-latest'
        run: pip install nuitka

      - name: 安装 MinGW64（Windows）
        if: matrix.os == 'windows-latest'
        run: choco install -y mingw --version=14.2.0

      - name: 打包（调用 deploy.py）
        run: python deploy.py

      - name: 制作 macOS .dmg
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          # 查找 Nuitka 生成的 .app（在 .dist 目录内）
          APP_PATH=$(find dist -maxdepth 3 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "找不到 .app，请检查 build 输出"
            ls -R dist
            exit 1
          fi
          echo "APP 路径: $APP_PATH"
          rm -f dist/Fairy-Kekkai-Workshop.dmg
          create-dmg \
            --volname "Fairy Kekkai Workshop" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$(basename "$APP_PATH")" 175 190 \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "dist/Fairy-Kekkai-Workshop.dmg" \
            "$APP_PATH" \
          || true
          test -f dist/Fairy-Kekkai-Workshop.dmg

      - name: 验证产物
        shell: bash
        run: |
          ls -la dist || true
          if [ ! -e "${{ matrix.artifact_path }}" ]; then
            echo "产物不存在: ${{ matrix.artifact_path }}"
            echo "=== dist 目录结构 ==="
            find dist -maxdepth 4 -type f 2>/dev/null || echo "dist 目录不存在"
            exit 1
          fi
          echo "产物已就绪"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
