name: Build CI
# 自动+手动双触发；产物仅作为 Artifact 上传
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Fairy-Kekkai-Workshop-Windows
            artifact_path: dist/Fairy-Kekkai-Workshop.dist/Fairy-Kekkai-Workshop.exe
            deploy_args: ""
          - os: macos-latest
            artifact_name: Fairy-Kekkai-Workshop-macOS
            artifact_path: dist/Fairy-Kekkai-Workshop.dmg
            deploy_args: ""
          - os: ubuntu-latest
            artifact_name: Fairy-Kekkai-Workshop-Linux
            artifact_path: dist/Fairy-Kekkai-Workshop/
            deploy_args: ""

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装 PyInstaller（Linux 分支使用）
        run: pip install pyinstaller

      - name: 安装项目依赖
        run: pip install -r requirements.txt

      - name: 安装 Nuitka（Windows / macOS）
        if: matrix.os != 'ubuntu-latest'
        run: pip install nuitka

      - name: 安装 MinGW64（Windows）
        if: matrix.os == 'windows-latest'
        run: choco install -y mingw --version=14.2.0

      - name: 创建 tools 占位目录（CI 环境无 tools.zip）
        run: mkdir -p tools

      - name: 打包（调用 deploy.py）
        env:
          PYTHONIOENCODING: utf-8
        run: python deploy.py

      - name: 制作 macOS .dmg
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          # 查找 Nuitka 生成的 .app（在 .dist 目录内）
          APP_PATH=$(find dist -maxdepth 3 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "找不到 .app，请检查 build 输出"
            ls -R dist
            exit 1
          fi
          echo "APP 路径: $APP_PATH"
          rm -f dist/Fairy-Kekkai-Workshop.dmg
          create-dmg \
            --volname "Fairy Kekkai Workshop" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$(basename "$APP_PATH")" 175 190 \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "dist/Fairy-Kekkai-Workshop.dmg" \
            "$APP_PATH" \
          || true
          test -f dist/Fairy-Kekkai-Workshop.dmg

      - name: 打包 Linux 系统包（deb / rpm / arch）
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update && sudo apt install -y ruby rubygems zstd libarchive-tools
          sudo gem install --no-document fpm
          VERSION=$(python -c "from app.common.setting import VERSION; print(VERSION)")

          PKG_DIR="dist/packaging"
          INSTALL_DIR="$PKG_DIR/opt/fairy-kekkai-workshop"
          BIN_DIR="$PKG_DIR/usr/bin"
          mkdir -p "$INSTALL_DIR" "$BIN_DIR"

          # 拷贝 PyInstaller 产物到包目录
          cp -a dist/Fairy-Kekkai-Workshop/* "$INSTALL_DIR/"

          # 创建启动脚本软链接
          ln -s /opt/fairy-kekkai-workshop/Fairy-Kekkai-Workshop "$BIN_DIR/fairy-kekkai-workshop"

          # 生成 .deb
          fpm -s dir -t deb \
            -n fairy-kekkai-workshop \
            -v "$VERSION" \
            --description "Fairy Kekkai Workshop - Video Subtitle Processing Tool" \
            --url "https://github.com/Fairy-Oracle-Sanctuary/Fairy-Kekkai-Workshop" \
            --license MIT \
            -C "$PKG_DIR" \
            -p dist/fairy-kekkai-workshop_${VERSION}_amd64.deb \
            .

          # 生成 .rpm
          fpm -s dir -t rpm \
            -n fairy-kekkai-workshop \
            -v "$VERSION" \
            --description "Fairy Kekkai Workshop - Video Subtitle Processing Tool" \
            --url "https://github.com/Fairy-Oracle-Sanctuary/Fairy-Kekkai-Workshop" \
            --license MIT \
            -C "$PKG_DIR" \
            -p dist/fairy-kekkai-workshop-${VERSION}-1.x86_64.rpm \
            .

          # 生成 Arch Linux .pkg.tar.zst
          fpm -s dir -t pacman \
            -n fairy-kekkai-workshop \
            -v "$VERSION" \
            --description "Fairy Kekkai Workshop - Video Subtitle Processing Tool" \
            --url "https://github.com/Fairy-Oracle-Sanctuary/Fairy-Kekkai-Workshop" \
            --license MIT \
            -C "$PKG_DIR" \
            -p dist/fairy-kekkai-workshop-${VERSION}-1-x86_64.pkg.tar.zst \
            .

          echo "=== 生成的包 ==="
          ls -lh dist/*.deb dist/*.rpm dist/*.pkg.tar.zst

      - name: 验证产物
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            DEB=$(ls dist/*.deb 2>/dev/null)
            RPM=$(ls dist/*.rpm 2>/dev/null)
            ZST=$(ls dist/*.pkg.tar.zst 2>/dev/null)
            if [ -z "$DEB" ] || [ -z "$RPM" ] || [ -z "$ZST" ]; then
              echo "缺少 Linux 系统包产物"
              ls -la dist/
              exit 1
            fi
            echo "DEB: $DEB"
            echo "RPM: $RPM"
            echo "ARCH: $ZST"
            echo "产物已就绪"
          else
            ls -la dist || true
            if [ ! -e "${{ matrix.artifact_path }}" ]; then
              echo "产物不存在: ${{ matrix.artifact_path }}"
              find dist -maxdepth 4 -type f 2>/dev/null || echo "dist 目录不存在"
              exit 1
            fi
            echo "产物已就绪"
          fi

      - name: 上传 Linux 系统包
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 14

      - name: 上传构建产物
        if: matrix.os != 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
