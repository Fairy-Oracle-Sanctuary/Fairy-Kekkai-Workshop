name: Build CI
on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'Fairy-Kekkai-Workshop.py'
      - 'requirements.txt'
      - 'deploy.py'
      - '.github/workflows/build-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'Fairy-Kekkai-Workshop.py'
      - 'requirements.txt'
      - 'deploy.py'
      - '.github/workflows/build-ci.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──
          - os: windows-latest
            label: Windows x64
            arch: x86_64
            artifact_name: Fairy-Kekkai-Workshop-Windows-x64
            artifact_path: dist/Fairy-Kekkai-Workshop.dist/
            use_mingw: true
          - os: windows-11-arm
            label: Windows ARM64
            arch: arm64
            artifact_name: Fairy-Kekkai-Workshop-Windows-arm64
            artifact_path: dist/Fairy-Kekkai-Workshop.dist/
            use_mingw: false
          # ── macOS ──
          - os: macos-13
            label: macOS x64 (Intel)
            arch: x86_64
            artifact_name: Fairy-Kekkai-Workshop-macOS-x64
            artifact_path: dist/Fairy-Kekkai-Workshop.dist/
            make_dmg: true
          - os: macos-latest
            label: macOS ARM64 (Apple Silicon)
            arch: arm64
            artifact_name: Fairy-Kekkai-Workshop-macOS-arm64
            artifact_path: dist/Fairy-Kekkai-Workshop.dist/
            make_dmg: true
          # ── Linux ──
          - os: ubuntu-latest
            label: Linux x64
            arch: x86_64
            artifact_name: Fairy-Kekkai-Workshop-Linux-x64
            artifact_path: dist/Fairy-Kekkai-Workshop/
            deb_arch: amd64
            rpm_arch: x86_64
            archlinux_arch: x86_64
          - os: ubuntu-24.04-arm
            label: Linux ARM64
            arch: arm64
            artifact_name: Fairy-Kekkai-Workshop-Linux-arm64
            artifact_path: dist/Fairy-Kekkai-Workshop/
            deb_arch: arm64
            rpm_arch: aarch64
            archlinux_arch: aarch64

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装 PyInstaller（Linux 分支使用）
        if: startsWith(matrix.os, 'ubuntu')
        run: pip install pyinstaller

      - name: 预装 numpy（ARM 需先装 wheel 避免源码编译失败）
        env:
          PIP_ONLY_BINARY: numpy
        run: pip install "numpy>=1.26,<3"

      - name: 安装项目依赖
        run: pip install -r requirements.txt

      - name: 安装 Nuitka（Windows / macOS）
        if: "!startsWith(matrix.os, 'ubuntu')"
        run: pip install nuitka

      - name: 安装 MinGW64（Windows x64）
        if: matrix.use_mingw
        run: choco install -y mingw --version=14.2.0

      - name: 创建 tools 占位目录
        run: mkdir -p tools

      - name: 动态设置版本号（git commit + 编译时间）
        shell: bash
        env:
          BUILD_COMMIT: ${{ github.sha }}
        run: |
          python << 'PYEOF'
          import os, re
          from datetime import datetime, timezone, timedelta
          build_time = (datetime.now(timezone(timedelta(hours=8)))
                        .strftime('%Y-%m-%d %H:%M:%S'))
          commit = os.environ['BUILD_COMMIT'][:7]
          p = 'app/common/setting.py'
          with open(p, 'r', encoding='utf-8') as f:
              content = f.read()
          content = re.sub(r'VERSION\s*=\s*"[^"]*"', f'VERSION = "{commit}-ci"', content)
          content = re.sub(r'UPDATE_TIME\s*=\s*"[^"]*"', f'UPDATE_TIME = "{build_time}"', content)
          content = re.sub(r'CI_BUILD_WARNING\s*=\s*"[^"]*"', f'CI_BUILD_WARNING = "此为CI测试版本，请勿在生产环境中使用"', content)
          with open(p, 'w', encoding='utf-8') as f:
              f.write(content)
          print(f'VERSION={commit}-ci  UPDATE_TIME={build_time}')
          PYEOF

      - name: 打包（调用 deploy.py）
        env:
          PYTHONIOENCODING: utf-8
        run: python deploy.py

      - name: 制作 macOS .dmg
        if: matrix.make_dmg
        run: |
          brew install create-dmg
          APP_PATH=$(find dist -maxdepth 3 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "找不到 .app，请检查 build 输出"
            ls -R dist
            exit 1
          fi
          echo "APP 路径: $APP_PATH"
          DMG_NAME="dist/Fairy-Kekkai-Workshop-${{ matrix.arch }}.dmg"
          rm -f "$DMG_NAME"
          create-dmg \
            --volname "Fairy Kekkai Workshop" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$(basename "$APP_PATH")" 175 190 \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "$DMG_NAME" \
            "$APP_PATH" \
          || true
          test -f "$DMG_NAME"

      - name: 打包 Linux 系统包（deb / rpm / arch）
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update -o Dir::Etc::sourcelist="sources.list" \
                                -o Dir::Etc::sourceparts="-" \
                                -o APT::Get::List-Cleanup="0"
          sudo apt-get install -y ruby rubygems zstd libarchive-tools
          sudo gem install --no-document fpm
          # 版本号中的 "-" 替换为 "_"，避免 pacman 警告
          PKG_VERSION=$(grep -oP 'VERSION\s*=\s*"\K[^"]+' app/common/setting.py | head -1 | tr '-' '_')
          echo "PKG_VERSION=$PKG_VERSION"

          PKG_DIR="dist/packaging"
          INSTALL_DIR="$PKG_DIR/opt/fairy-kekkai-workshop"
          BIN_DIR="$PKG_DIR/usr/bin"
          mkdir -p "$INSTALL_DIR" "$BIN_DIR"

          cp -a dist/Fairy-Kekkai-Workshop/* "$INSTALL_DIR/"
          ln -s /opt/fairy-kekkai-workshop/Fairy-Kekkai-Workshop "$BIN_DIR/fairy-kekkai-workshop"

          # .deb
          fpm -s dir -t deb \
            -n fairy-kekkai-workshop \
            -v "$PKG_VERSION" \
            -a "${{ matrix.deb_arch }}" \
            --description "Fairy Kekkai Workshop - Video Subtitle Processing Tool" \
            --url "https://github.com/Fairy-Oracle-Sanctuary/Fairy-Kekkai-Workshop" \
            --license MIT \
            -C "$PKG_DIR" \
            -p dist/fairy-kekkai-workshop_${PKG_VERSION}_${{ matrix.deb_arch }}.deb \
            .

          # .rpm
          fpm -s dir -t rpm \
            -n fairy-kekkai-workshop \
            -v "$PKG_VERSION" \
            -a "${{ matrix.rpm_arch }}" \
            --description "Fairy Kekkai Workshop - Video Subtitle Processing Tool" \
            --url "https://github.com/Fairy-Oracle-Sanctuary/Fairy-Kekkai-Workshop" \
            --license MIT \
            -C "$PKG_DIR" \
            -p dist/fairy-kekkai-workshop-${PKG_VERSION}-1.${{ matrix.rpm_arch }}.rpm \
            .

          # Arch Linux .pkg.tar.zst - 用 gnutar + zstd 避免 fpm 调找不到的 bsdtar
          fpm -s dir -t pacman \
            -n fairy-kekkai-workshop \
            -v "$PKG_VERSION" \
            -a "${{ matrix.archlinux_arch }}" \
            --description "Fairy Kekkai Workshop - Video Subtitle Processing Tool" \
            --url "https://github.com/Fairy-Oracle-Sanctuary/Fairy-Kekkai-Workshop" \
            --license MIT \
            -C "$PKG_DIR" \
            --pacman-use-file-permissions \
            --pacman-chown=root:root \
            -p dist/fairy-kekkai-workshop-${PKG_VERSION}-1-${{ matrix.archlinux_arch }}.pkg.tar.zst \
            .

          echo "=== 生成的包 ==="
          ls -lh dist/*.deb dist/*.rpm dist/*.pkg.tar.zst

      - name: 验证产物
        shell: bash
        run: |
          if [ ! -e "${{ matrix.artifact_path }}" ]; then
            echo "编译目录不存在: ${{ matrix.artifact_path }}"
            ls -la dist/ 2>/dev/null || echo "dist 目录不存在"
            exit 1
          fi
          echo "编译目录: ${{ matrix.artifact_path }}"
          ls -la "${{ matrix.artifact_path }}" 2>/dev/null | head -20
          echo "产物已就绪"

      # ── 上传：非 Linux 平台（便携包 + dmg） ──
      - name: 上传构建产物（Windows / macOS）
        if: "!startsWith(matrix.os, 'ubuntu')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_path }}
            dist/*.dmg
          if-no-files-found: error
          retention-days: 14

      # ── 上传：Linux 便携包 ──
      - name: 上传 Linux 便携包
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-portable
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

      # ── 上传：Linux DEB ──
      - name: 上传 Linux DEB 包
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-deb
          path: dist/*.deb
          if-no-files-found: error
          retention-days: 14

      # ── 上传：Linux RPM ──
      - name: 上传 Linux RPM 包
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-rpm
          path: dist/*.rpm
          if-no-files-found: error
          retention-days: 14

      # ── 上传：Linux AUR/Arch ──
      - name: 上传 Linux AUR 包
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-aur
          path: dist/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 14
