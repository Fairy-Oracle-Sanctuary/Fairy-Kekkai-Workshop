name: Sync Release to Gitea
# 自动+手动双触发
on:
  release:
    types: [published, edited, deleted]
  workflow_dispatch:
    inputs:
      tag_name:
        description:
        required: false
        default: ''

jobs:
  sync_release:
    runs-on: ubuntu-latest
    env:
      GITEA_URL: ${{ secrets.GITEA_URL }}
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
      GITEA_OWNER: Fairy-Oracle-Sanctuary
      GITEA_REPO: Fairy-Kekkai-Workshop
    steps:
      - name: 拉取完整仓库数据（获取Release、附件）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装依赖jq处理API
        run: sudo apt update && sudo apt install -y jq curl

      - name: 同步Release脚本
        run: |
          # 传入手动输入的tag
          TARGET_TAG="${{ github.event.inputs.tag_name }}"
          GH_OWNER=${{ github.repository_owner }}
          GH_REPO=${{ github.event_name == 'release' && github.event.repository.name || github.event.repository.name }}

          # 获取所有GitHub Release
          GH_RELEASES=$(curl -s -H "Authorization: token ${{ github.TOKEN }}" "https://api.github.com/repos/$GH_OWNER/$GH_REPO/releases")

          # 筛选需要同步的release
          if [ -n "$TARGET_TAG" ]; then
            GH_RELEASES=$(echo "$GH_RELEASES" | jq "[.[] | select(.tag_name == \"$TARGET_TAG\")]")
          fi

          # 遍历每个Release同步到Gitea
          echo "$GH_RELEASES" | jq -c '.[]' | while read -r rel; do
            TAG=$(echo "$rel" | jq -r '.tag_name')
            TITLE=$(echo "$rel" | jq -r '.name')
            BODY=$(echo "$rel" | jq -r '.body')
            DRAFT=$(echo "$rel" | jq -r '.draft')
            PRERELEASE=$(echo "$rel" | jq -r '.prerelease')
            ASSETS=$(echo "$rel" | jq -r '.assets')

            echo "===== 处理Tag: $TAG ====="

            # 替换正文 github 域名到自建Gitea
            NEW_BODY=$(echo "$BODY" | sed 's|https://github.com|https://git.ora-san.org|g')

            # 1. 查询Gitea是否已有该tag的release
            GITEA_EXIST=$(curl -s -H "Authorization: token $GITEA_TOKEN" "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/releases/tags/$TAG")
            EXIST_ID=$(echo "$GITEA_EXIST" | jq -r '.id')

            # 组装请求体（使用替换后的NEW_BODY）
            PAYLOAD=$(jq -n \
              --arg t "$TAG" \
              --arg n "$TITLE" \
              --arg b "$NEW_BODY" \
              --argjson d "$DRAFT" \
              --argjson p "$PRERELEASE" \
              '{tag_name:$t, name:$n, body:$b, draft:$d, prerelease:$p}')

            if [ "$EXIST_ID" != "null" ]; then
              # 更新已有Release
              echo "更新Gitea Release $TAG"
              curl -X PATCH -H "Authorization: token $GITEA_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" \
                "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/releases/$EXIST_ID"
              # 清空原有附件（避免重复）
              echo "$GITEA_EXIST" | jq -r '.assets[].id' | while read aid; do
                curl -X DELETE -H "Authorization: token $GITEA_TOKEN" "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/releases/assets/$aid"
              done
            else
              # 创建新Release
              echo "新建Gitea Release $TAG"
              curl -X POST -H "Authorization: token $GITEA_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" \
                "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/releases"
            fi

            # 2. 上传所有二进制附件Assets
            echo "$ASSETS" | jq -c '.[]' | while read -r asset; do
              ASSET_URL=$(echo "$asset" | jq -r '.browser_download_url')
              ASSET_NAME=$(echo "$asset" | jq -r '.name')
              echo "下载并上传附件: $ASSET_NAME"
              curl -sL "$ASSET_URL" -o "$ASSET_NAME"
              # 获取最新release ID上传文件
              LATEST_REL_ID=$(curl -s -H "Authorization: token $GITEA_TOKEN" "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/releases/tags/$TAG" | jq -r '.id')
              curl -X POST -H "Authorization: token $GITEA_TOKEN" \
                -F "attachment=@$ASSET_NAME;filename=$ASSET_NAME" \
                "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/releases/$LATEST_REL_ID/assets"
              rm -f "$ASSET_NAME"
            done

            # 3. 如果GitHub删除Release，则同步删除Gitea对应版本
            if [[ "${{ github.event.action }}" == "deleted" ]]; then
              curl -X DELETE -H "Authorization: token $GITEA_TOKEN" "$GITEA_URL/api/v1/repos/$GITEA_OWNER/$GITEA_REPO/releases/$EXIST_ID"
              echo "已删除Gitea Release $TAG"
            fi
          done
